version: '3.9'

services:
  app:
    build: .

    container_name: AiHunt_python

    ports:
      - "8080:8080"

    env_file:
      - .env

    restart: always

    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: AiHunt_python_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped

volumes:
    pgdata:
  